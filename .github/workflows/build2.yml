name: Build Windows x64  
  
on:  
  push:  
    branches: [main]  
  pull_request:  
    branches: [main]  
  workflow_dispatch:  
  
env:  
  CMAKE_BUILD_FOLDER: .cmake-build-release  
  CMAKE_BUILD_PARALLEL_LEVEL: 4  
  CMAKE_GENERATOR: Ninja Multi-Config  
  
jobs:  
  build-windows:  
    runs-on: windows-2022  
  
    steps:  
      # Must run before actions/checkout@v4.  
      # Configures Git on the Windows runner to enable core.longpaths,  
      # bypassing the 260-character MAX_PATH limit for deeply nested checkouts.  
      - name: Enable Git long paths support  
        run: git config --system core.longpaths true  
  
      - name: Checkout repository  
        uses: actions/checkout@v4  
  
      # vcpkg-031f4afe... and vcpkg-registry-f503eea8... each contain a redundant  
      # inner directory with the identical name, doubling the effective path depth.  
      # This step moves the inner contents up one level and removes the empty shell,  
      # reducing the maximum path length before any build tool touches these files.  
      - name: Flatten redundant nested directories in vcpkg-dependency-source  
        shell: pwsh  
        run: |  
          $vcpkgOuter = "${{ github.workspace }}\vcpkg-dependency-source\vcpkg-031f4afe03be385aee354f15be6e6b1fe57497c7"  
          $vcpkgInner = "$vcpkgOuter\vcpkg-031f4afe03be385aee354f15be6e6b1fe57497c7"  
          if (Test-Path $vcpkgInner) {  
            Get-ChildItem -Path $vcpkgInner -Force | ForEach-Object {  
              Move-Item -Path $_.FullName -Destination $vcpkgOuter -Force  
            }  
            Remove-Item -Path $vcpkgInner -Force -Recurse  
          }  
  
          $regOuter = "${{ github.workspace }}\vcpkg-dependency-source\vcpkg-registry-f503eea8c313ba8f61d97a5bb0f37e7ba69f749c"  
          $regInner = "$regOuter\vcpkg-registry-f503eea8c313ba8f61d97a5bb0f37e7ba69f749c"  
          if (Test-Path $regInner) {  
            Get-ChildItem -Path $regInner -Force | ForEach-Object {  
              Move-Item -Path $_.FullName -Destination $regOuter -Force  
            }  
            Remove-Item -Path $regInner -Force -Recurse  
          }  
  
      - name: Configure git identity for local commits  
        shell: pwsh  
        run: |  
          git config --global user.email "ci@build"  
          git config --global user.name "CI"  
  
      # Replaces the GitHub clone of microsoft/vcpkg.  
      # Copies the flattened local snapshot to the vendor path, initialises it as a  
      # git repo with fixed author/committer dates (making the commit hash deterministic  
      # across runs so the binary cache key stays stable), then rewrites  
      # vcpkg-configuration.json to point the default-registry at this local repo.  
      - name: Set up vcpkg from local snapshot  
        shell: pwsh  
        run: |  
          New-Item -ItemType Directory -Force -Path "vendor\github.com\microsoft"  
          Copy-Item -Path "${{ github.workspace }}\vcpkg-dependency-source\vcpkg-031f4afe03be385aee354f15be6e6b1fe57497c7" `  
                    -Destination "vendor\github.com\microsoft\vcpkg" -Recurse -Force  
  
          Push-Location "vendor\github.com\microsoft\vcpkg"  
          git init  
          git add .  
          $env:GIT_AUTHOR_DATE    = "2024-01-01T00:00:00+00:00"  
          $env:GIT_COMMITTER_DATE = "2024-01-01T00:00:00+00:00"  
          git commit -m "local vcpkg snapshot"  
          $vcpkgHash = git rev-parse HEAD  
          Pop-Location  
  
          $workspace = "${{ github.workspace }}" -replace '\\', '/'  
          $vcpkgUrl  = "file:///$workspace/vendor/github.com/microsoft/vcpkg"  
          $config    = Get-Content "${{ github.workspace }}\vcpkg-configuration.json" -Raw  
          $config    = $config -replace '"repository":\s*"https://github\.com/microsoft/vcpkg\.git"', "`"repository`": `"$vcpkgUrl`""  
          $config    = $config -replace '"baseline":\s*"242ac6932a9cd2607332969129e9572516f28d65"', "`"baseline`": `"$vcpkgHash`""  
          $config | Set-Content "${{ github.workspace }}\vcpkg-configuration.json"  
  
          & "${{ github.workspace }}\vendor\github.com\microsoft\vcpkg\bootstrap-vcpkg.bat" -disableMetrics  
  
      # Replaces the GitHub clone of carbonengine/vcpkg-registry.  
      # Same deterministic-commit approach. Rewrites vcpkg-configuration.json to use  
      # a file:// URL and the new local baseline hash for the carbonengine registry.  
      - name: Set up carbonengine/vcpkg-registry from local snapshot  
        shell: pwsh  
        run: |  
          New-Item -ItemType Directory -Force -Path "vendor\github.com\carbonengine"  
          Copy-Item -Path "${{ github.workspace }}\vcpkg-dependency-source\vcpkg-registry-f503eea8c313ba8f61d97a5bb0f37e7ba69f749c" `  
                    -Destination "vendor\github.com\carbonengine\vcpkg-registry" -Recurse -Force  
  
          Push-Location "vendor\github.com\carbonengine\vcpkg-registry"  
          git init  
          git add .  
          $env:GIT_AUTHOR_DATE    = "2024-01-01T00:00:00+00:00"  
          $env:GIT_COMMITTER_DATE = "2024-01-01T00:00:00+00:00"  
          git commit -m "local vcpkg-registry snapshot"  
          $regHash = git rev-parse HEAD  
          Pop-Location  
  
          $workspace = "${{ github.workspace }}" -replace '\\', '/'  
          $regUrl    = "file:///$workspace/vendor/github.com/carbonengine/vcpkg-registry"  
          $config    = Get-Content "${{ github.workspace }}\vcpkg-configuration.json" -Raw  
          $config    = $config -replace '"repository":\s*"git@github\.com:carbonengine/vcpkg-registry\.git"', "`"repository`": `"$regUrl`""  
          $config    = $config -replace '"baseline":\s*"a83134805f3fa07da6a6add87c4b250d9778bfd1"', "`"baseline`": `"$regHash`""  
          $config | Set-Content "${{ github.workspace }}\vcpkg-configuration.json"  
  
      # CMakePresets.json sets VCPKG_OVERLAY_TRIPLETS to the working-tree path  
      # vendor/github.com/carbonengine/vcpkg-registry/triplets (not the regcache clone),  
      # so patching the file here takes effect at build time without touching git history.  
      - name: Patch triplet - toolset v141 to v143 and add C++17 compat flags  
        shell: pwsh  
        run: |  
          (Get-Content vendor/github.com/carbonengine/vcpkg-registry/triplets/x64-windows-release.cmake) `  
            -replace 'set\(VCPKG_PLATFORM_TOOLSET v141\)', 'set(VCPKG_PLATFORM_TOOLSET v143)' |  
            Set-Content vendor/github.com/carbonengine/vcpkg-registry/triplets/x64-windows-release.cmake  
          Add-Content -Path "vendor/github.com/carbonengine/vcpkg-registry/triplets/x64-windows-release.cmake" `  
            -Value 'set(VCPKG_CXX_FLAGS "${VCPKG_CXX_FLAGS} /D_SILENCE_ALL_CXX17_DEPRECATION_WARNINGS /D_SILENCE_STDEXT_HASH_DEPRECATION_WARNINGS")'  
          Add-Content -Path "vendor/github.com/carbonengine/vcpkg-registry/triplets/x64-windows-release.cmake" `  
            -Value 'set(VCPKG_C_FLAGS "${VCPKG_C_FLAGS} /D_SILENCE_ALL_CXX17_DEPRECATION_WARNINGS /D_SILENCE_STDEXT_HASH_DEPRECATION_WARNINGS")'  
  
      - name: Cache vcpkg binary packages  
        uses: actions/cache@v4  
        with:  
          path: ${{ github.workspace }}/vcpkg-binary-cache  
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}  
          restore-keys: vcpkg-${{ runner.os }}-  
  
      - name: Set up MSVC x64 environment  
        uses: ilammy/msvc-dev-cmd@v1  
        with:  
          arch: x64  
  
      - name: Configure CMake  
        shell: pwsh  
        env:  
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-binary-cache,readwrite  
          X_VCPKG_REGISTRIES_CACHE: ${{ github.workspace }}\regcache  
        run: |  
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\regcache"  
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\vcpkg-binary-cache"  
          cmake --preset x64-windows-release -S . -B ${{ env.CMAKE_BUILD_FOLDER }} -DCMAKE_MAKE_PROGRAM=ninja -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\.build-artifact" -DVCPKG_INSTALL_OPTIONS="--x-buildtrees-root=${{ github.workspace }}\buildtrees" -DVCPKG_OVERLAY_PORTS="${{ github.workspace }}/ports" -DBUILD_DX11=ON -DBUILD_DX12=ON -DBUILD_SHADER_COMPILER=ON  
  
      - name: Print vcpkg build logs on failure  
        if: failure()  
        shell: pwsh  
        run: |  
          Get-ChildItem "${{ github.workspace }}\buildtrees" -Filter "*-out.log" -Recurse | ForEach-Object { Write-Host "=== $($_.FullName) ==="; Get-Content $_.FullName | Select-Object -Last 100 }  
          $manifestLog = "${{ github.workspace }}\.cmake-build-release\vcpkg-manifest-install.log"  
          if (Test-Path $manifestLog) { Write-Host "=== vcpkg-manifest-install.log ==="; Get-Content $manifestLog | Select-Object -Last 200 }  
  
      - name: Build  
        shell: pwsh  
        env:  
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-binary-cache,readwrite  
        run: cmake --build ${{ env.CMAKE_BUILD_FOLDER }} --config Release  
  
      - name: Install  
        shell: pwsh  
        run: cmake --install ${{ env.CMAKE_BUILD_FOLDER }} --config Release  
  
      - name: Upload artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: trinity-windows-x64-release  
          path: ${{ github.workspace }}\.build-artifact

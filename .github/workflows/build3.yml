name: Build Win x64

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CMAKE_BUILD_FOLDER: .cmake-build-release
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  CMAKE_GENERATOR: Ninja Multi-Config

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git global SSH-to-HTTPS URL rewrite
        shell: pwsh
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Clone and bootstrap vcpkg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "vendor/github.com/microsoft"
          git clone https://github.com/microsoft/vcpkg.git vendor/github.com/microsoft/vcpkg
          git -C vendor/github.com/microsoft/vcpkg checkout 242ac6932a9cd2607332969129e9572516f28d65
          vendor\github.com\microsoft\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Clone carbonengine/vcpkg-registry
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "vendor/github.com/carbonengine"
          git clone https://github.com/carbonengine/vcpkg-registry.git vendor/github.com/carbonengine/vcpkg-registry
          # Checkout the exact baseline commit referenced in vcpkg-configuration.json
          # to ensure port files match the expected versions
          git -C vendor/github.com/carbonengine/vcpkg-registry checkout a83134805f3fa07da6a6add87c4b250d9778bfd1

      - name: Create overlay port for carbon-blue with NetworkLogger fix
        shell: pwsh
        run: |
          # ============================================================
          # Create an overlay port for carbon-blue that patches
          # NetworkLogger.cpp to fix C2440 compilation error:
          #   "return": cannot convert from 'int' to 'PyObject *'"
          #
          # Root cause: PyErr_SetString() returns int (-1), not PyObject*.
          # The comma operator "return PyErr_SetString(...), 0;" returns
          # int 0, which cannot be implicitly converted to PyObject*.
          #
          # Fix: Call PyErr_SetString() as a statement, then return nullptr.
          # ============================================================

          # Create overlay ports directory structure
          New-Item -ItemType Directory -Force -Path "overlay-ports/carbon-blue" | Out-Null

          # Copy the original carbon-blue port files from the cloned registry
          Copy-Item "vendor/github.com/carbonengine/vcpkg-registry/ports/carbon-blue/*" `
                    "overlay-ports/carbon-blue/" -Recurse -Force

          # --- Create the patch file with explicit tab characters ---
          $tab = [char]9  # Tab character
          $patchLines = @(
            "--- a/src/NetworkLogger.cpp"
            "+++ b/src/NetworkLogger.cpp"
            "@@ -633,6 +633,7 @@"
            "${tab}${tab}bool ret = CCP::SetupNetworkLogging(  serverName, serverPort, (CCP::LogType) threshold, role, errorMessage, errorMessageBufferSize );"
            "${tab}${tab}if (!ret)"
            "${tab}${tab}{"
            "-${tab}${tab}${tab}return PyErr_SetString(PyExc_RuntimeError, errorMessage), 0;"
            "+${tab}${tab}${tab}PyErr_SetString(PyExc_RuntimeError, errorMessage);"
            "+${tab}${tab}${tab}return nullptr;"
            "${tab}${tab}}"
            "${tab}${tab}Py_RETURN_TRUE;"
            ""
          )
          $patchContent = $patchLines -join "`n"
          $patchPath = "${{ github.workspace }}\overlay-ports\carbon-blue\fix-networklogger.patch"
          [System.IO.File]::WriteAllText($patchPath, $patchContent)

          Write-Host "=== Patch file contents ==="
          Get-Content $patchPath | ForEach-Object { Write-Host "  $_" }

          # --- Modify portfile.cmake to apply the patch ---
          $portfilePath = "${{ github.workspace }}\overlay-ports\carbon-blue\portfile.cmake"
          $lines = Get-Content $portfilePath

          # Check if PATCHES already exists in the portfile
          $hasPatches = $false
          foreach ($line in $lines) {
            if ($line -match 'PATCHES') {
              $hasPatches = $true
              break
            }
          }

          if ($hasPatches) {
            # PATCHES section already exists — add our patch filename after it
            $newLines = [System.Collections.ArrayList]::new()
            foreach ($line in $lines) {
              [void]$newLines.Add($line)
              if ($line -match 'PATCHES') {
                [void]$newLines.Add("        fix-networklogger.patch")
              }
            }
            $newLines | Set-Content $portfilePath
          } else {
            # No PATCHES section — find the closing ")" of vcpkg_from_github/git
            # and insert PATCHES before it
            $vcpkgFromLineNum = -1
            $closingParenLineNum = -1

            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match 'vcpkg_from_(github|git)') {
                $vcpkgFromLineNum = $i
              }
              if ($vcpkgFromLineNum -ge 0 -and $closingParenLineNum -lt 0 -and $lines[$i] -match '^\s*\)\s*$') {
                $closingParenLineNum = $i
                break
              }
            }

            if ($closingParenLineNum -ge 0) {
              $newLines = [System.Collections.ArrayList]::new()
              # Lines before closing paren
              for ($i = 0; $i -lt $closingParenLineNum; $i++) {
                [void]$newLines.Add($lines[$i])
              }
              # Insert PATCHES
              [void]$newLines.Add("    PATCHES")
              [void]$newLines.Add("        fix-networklogger.patch")
              # Lines from closing paren to end
              for ($i = $closingParenLineNum; $i -lt $lines.Count; $i++) {
                [void]$newLines.Add($lines[$i])
              }
              $newLines | Set-Content $portfilePath
            } else {
              Write-Error "Could not find vcpkg_from_* closing parenthesis in portfile.cmake"
              Write-Host "=== portfile.cmake contents ==="
              Get-Content $portfilePath | ForEach-Object { Write-Host "  $_" }
              exit 1
            }
          }

          Write-Host ""
          Write-Host "=== Modified portfile.cmake ==="
          Get-Content $portfilePath | ForEach-Object { Write-Host "  $_" }

          Write-Host ""
          Write-Host "=== Overlay port directory contents ==="
          Get-ChildItem "overlay-ports/carbon-blue" | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Patch triplet - toolset v141 to v143 and add C++17 compat flags
        shell: pwsh
        run: |
          (Get-Content vendor/github.com/carbonengine/vcpkg-registry/triplets/x64-windows-release.cmake) -replace 'set\(VCPKG_PLATFORM_TOOLSET v141\)', 'set(VCPKG_PLATFORM_TOOLSET v143)' | Set-Content vendor/github.com/carbonengine/vcpkg-registry/triplets/x64-windows-release.cmake
          Add-Content -Path "vendor/github.com/carbonengine/vcpkg-registry/triplets/x64-windows-release.cmake" -Value 'set(VCPKG_CXX_FLAGS "${VCPKG_CXX_FLAGS} /D_SILENCE_ALL_CXX17_DEPRECATION_WARNINGS /D_SILENCE_STDEXT_HASH_DEPRECATION_WARNINGS")'
          Add-Content -Path "vendor/github.com/carbonengine/vcpkg-registry/triplets/x64-windows-release.cmake" -Value 'set(VCPKG_C_FLAGS "${VCPKG_C_FLAGS} /D_SILENCE_ALL_CXX17_DEPRECATION_WARNINGS /D_SILENCE_STDEXT_HASH_DEPRECATION_WARNINGS")'

      - name: Patch vcpkg-configuration.json SSH URL to HTTPS
        shell: pwsh
        run: (Get-Content vcpkg-configuration.json) -replace 'git@github\.com:carbonengine/vcpkg-registry\.git', 'https://github.com/carbonengine/vcpkg-registry.git' | Set-Content vcpkg-configuration.json

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-binary-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-binary-cache,readwrite
          X_VCPKG_REGISTRIES_CACHE: ${{ github.workspace }}\regcache
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\regcache"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\vcpkg-binary-cache"
          cmake --preset x64-windows-release -S . -B ${{ env.CMAKE_BUILD_FOLDER }} `
            -DCMAKE_MAKE_PROGRAM=ninja `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\.build-artifact" `
            -DVCPKG_INSTALL_OPTIONS="--x-buildtrees-root=${{ github.workspace }}\buildtrees" `
            -DVCPKG_OVERLAY_PORTS="${{ github.workspace }}\overlay-ports" `
            -DBUILD_DX11=ON -DBUILD_DX12=ON -DBUILD_SHADER_COMPILER=ON

      - name: Print vcpkg build logs on failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "=== Searching for build logs ==="
          Get-ChildItem "${{ github.workspace }}\buildtrees" -Filter "*-out.log" -Recurse | ForEach-Object {
            Write-Host "=== $($_.FullName) ==="
            Get-Content $_.FullName | Select-Object -Last 100
          }
          Write-Host "=== Searching for patch logs ==="
          Get-ChildItem "${{ github.workspace }}\buildtrees" -Filter "*-patch*.log" -Recurse | ForEach-Object {
            Write-Host "=== $($_.FullName) ==="
            Get-Content $_.FullName
          }

      - name: Build
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-binary-cache,readwrite
        run: cmake --build ${{ env.CMAKE_BUILD_FOLDER }} --config Release

      - name: Install
        shell: pwsh
        run: cmake --install ${{ env.CMAKE_BUILD_FOLDER }} --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trinity-windows-x64-release
          path: ${{ github.workspace }}\.build-artifact
